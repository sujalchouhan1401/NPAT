<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=http://localhost:3000/">
  <title>Redirecting to NPAT Game...</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; color: #333; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    a { color: #3498db; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Redirecting to NPAT Game...</h2>
  <div class="loader"></div>
  <p>If you are not redirected, click here: <a href="http://localhost:3000/">http://localhost:3000/</a></p>
  <p><small>(Note: Please ensure the server is running by checking your terminal for <code>npm start</code>)</small></p>
</body>
</html>
